<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1b2e">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<title>Events — SCG Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0d1b2e;--navy-mid:#162236;--navy-light:#1e3047;--navy-card:#192840;
  --orange:#e87722;--orange-dark:#c5621a;--orange-glow:rgba(232,119,34,0.12);
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;--purple:#9b59b6;
  --text:#f0f4f8;--text-muted:#8ea3bc;--text-dim:#4d6580;
  --border:rgba(255,255,255,0.07);--border-o:rgba(232,119,34,0.35);
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--navy);color:var(--text);font-size:13px;line-height:1.5;}
body{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:9px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-link{display:flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:11px;letter-spacing:0.5px;transition:color 0.15s;}
.back-link:hover{color:var(--orange);}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);flex:1;text-align:center;}
.content{flex:1;padding:22px 26px;max-width:1100px;width:100%;margin:0 auto;}
.ph{margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:14px;}
.ptitle{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.psub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ffffff;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-label i{color:var(--orange);font-size:15px;}
.card{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px;}
.chart-wrap{position:relative;height:320px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--orange);}
.stat-label{font-size:11px;color:var(--text-muted);letter-spacing:0.5px;margin-top:2px;}
.stat-sub{font-size:11px;color:var(--text);letter-spacing:0.3px;margin-top:6px;font-weight:600;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--navy-light);color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);}
.tbl tr:hover td{background:rgba(255,255,255,0.03);}
.tbl tr.total-row td{font-weight:700;color:var(--orange);border-top:1px solid var(--border-o);}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;}
.badge-tc{background:rgba(52,152,219,0.15);color:#3498db;}
.badge-hoist{background:rgba(155,89,182,0.15);color:#9b59b6;}
#loading{text-align:center;padding:60px;color:var(--text-muted);font-size:13px;}
</style>
</head>
<body>
<div class="topbar">
  <a href="finance.html" class="back-link"><i class="ti ti-arrow-left"></i> Back to Finance</a>
  <span class="tb-title">EVENTS</span>
</div>
<div class="content">
  <div class="ph">
    <div class="ptitle">Events</div>
    <div class="psub">Monthly crane &amp; hoist event counts by market</div>
  </div>

  <div id="loading"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px;"></i>Loading events data...</div>

  <div id="main-content" style="display:none;">
    <!-- Stats -->
    <div class="stat-row" id="stat-row"></div>

    <!-- Chart -->
    <div style="margin-bottom:14px;">
      <div class="section-label"><i class="ti ti-chart-bar"></i> Monthly Events — Last 12 Months</div>
      <div class="card">
        <div class="chart-wrap"><canvas id="eventsChart"></canvas></div>
      </div>
    </div>

    <!-- Breakdown Table -->
    <div>
      <div class="section-label"><i class="ti ti-table"></i> Monthly Breakdown by Equipment &amp; Market</div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="tbl" id="breakdown-tbl">
          <thead>
            <tr>
              <th>Month</th>
              <th>Equipment / Market</th>
              <th>Erection</th>
              <th>Climb</th>
              <th>Jump</th>
              <th>Dismantle</th>
              <th>Anchors</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="breakdown-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
var PUB='2PACX-1vRt4rPD6G4Sffo_rq8EKKPmT6Ma9MS2u3jNS91P3AaUx0jtMPDugnmliM94EMvzIqZBgacwgmjPUswm';
var GID='1814824290';
var URL='https://docs.google.com/spreadsheets/d/e/'+PUB+'/pub?single=true&output=csv&gid='+GID;

function parseCSV(text){
  // Split into lines, trim whitespace
  var lines=text.split('\n').map(function(l){return l.trim();});
  var months=[];
  var lookahead=null;
  var i=0;
  while(i<lines.length){
    var line=lines[i];
    // Skip title row and blank rows
    if(!line||line.startsWith('ROLLING')){i++;continue;}
    // Check if this is a "30 DAY LOOKAHEAD" header
    if(line.startsWith('30 DAY LOOKAHEAD')){
      // Next is header row, then 8 data rows + total
      i++; // skip header row
      i++;
      var rows=[];
      while(i<lines.length&&lines[i]&&!lines[i].startsWith(',,,,,')){
        var cells=lines[i].split(',');
        if(cells[0]&&cells[0]!=='Total'){
          rows.push({name:cells[0],vals:[+cells[1]||0,+cells[2]||0,+cells[3]||0,+cells[4]||0,+cells[5]||0,+cells[6]||0]});
        } else if(cells[0]==='Total'){
          var tot={name:'Total',vals:[+cells[1]||0,+cells[2]||0,+cells[3]||0,+cells[4]||0,+cells[5]||0,+cells[6]||0]};
          lookahead={rows:rows,total:tot};
        }
        i++;
      }
      continue;
    }
    // Check if this looks like a month name (e.g. "Jun 2025")
    var monthMatch=line.match(/^([A-Za-z]+ \d{4})/);
    if(monthMatch){
      var monthName=monthMatch[1];
      i++; // skip header row
      i++;
      var rows=[];
      var total=null;
      while(i<lines.length){
        var r=lines[i];
        if(!r||r.startsWith(',,,,,,')){i++;break;}
        var cells=r.split(',');
        if(cells[0]==='Total'){
          total={name:'Total',vals:[+cells[1]||0,+cells[2]||0,+cells[3]||0,+cells[4]||0,+cells[5]||0,+cells[6]||0]};
        } else if(cells[0]){
          rows.push({name:cells[0],vals:[+cells[1]||0,+cells[2]||0,+cells[3]||0,+cells[4]||0,+cells[5]||0,+cells[6]||0]});
        }
        i++;
      }
      months.push({name:monthName,rows:rows,total:total});
      continue;
    }
    i++;
  }
  return{months:months,lookahead:lookahead};
}

fetch(URL).then(function(r){return r.text();}).then(function(csv){
  var data=parseCSV(csv);
  var months=data.months;
  var lookahead=data.lookahead;

  // --- Stats ---
  var MONTHS_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function monthLabel(name,offset){
    var parts=name.split(' ');
    var idx=MONTHS_ABBR.map(function(x){return x.toLowerCase();}).indexOf(parts[0].substring(0,3).toLowerCase());
    var year=parseInt(parts[1],10);
    idx+=offset;
    while(idx<0){idx+=12;year--;}
    while(idx>11){idx-=12;year++;}
    return MONTHS_ABBR[idx]+" '"+String(year).slice(2);
  }
  var totalAll=0,totalTC=0,totalHoist=0;
  months.forEach(function(m){
    if(m.total){
      totalAll+=m.total.vals[5];
      m.rows.forEach(function(r){
        if(r.name.startsWith('TC'))totalTC+=r.vals[5];
        if(r.name.startsWith('Hoist'))totalHoist+=r.vals[5];
      });
    }
  });
  var avgAll=months.length?(totalAll/months.length).toFixed(1):'0';
  var avgTC=months.length?(totalTC/months.length).toFixed(1):'0';
  var avgHoist=months.length?(totalHoist/months.length).toFixed(1):'0';
  var latestMonth=months.length>0?months[months.length-1]:null;
  var latestTotal=latestMonth&&latestMonth.total?latestMonth.total.vals[5]:0;
  var latestTC=0,latestHoist=0;
  if(latestMonth){
    latestMonth.rows.forEach(function(r){
      if(r.name.startsWith('TC'))latestTC+=r.vals[5];
      if(r.name.startsWith('Hoist'))latestHoist+=r.vals[5];
    });
  }
  var latestLabel=latestMonth?monthLabel(latestMonth.name,0):'';
  var nextLabel=latestMonth?monthLabel(latestMonth.name,1):'';
  var nextTotal=0,nextTC=0,nextHoist=0;
  if(lookahead&&lookahead.total){
    nextTotal=lookahead.total.vals[5];
    lookahead.rows.forEach(function(r){
      if(r.name.startsWith('TC'))nextTC+=r.vals[5];
      if(r.name.startsWith('Hoist'))nextHoist+=r.vals[5];
    });
  }
  var statRow=document.getElementById('stat-row');
  statRow.innerHTML=
    '<div class="stat"><div class="stat-val">'+totalAll+'</div><div class="stat-label">TOTAL EVENTS (12 MO)</div><div class="stat-sub">Avg '+avgAll+'/mo</div></div>'+
    '<div class="stat"><div class="stat-val">'+totalTC+'</div><div class="stat-label">TOWER CRANE EVENTS</div><div class="stat-sub">Avg '+avgTC+'/mo</div></div>'+
    '<div class="stat"><div class="stat-val">'+totalHoist+'</div><div class="stat-label">HOIST EVENTS</div><div class="stat-sub">Avg '+avgHoist+'/mo</div></div>'+
    '<div class="stat"><div class="stat-val">'+latestTotal+'</div><div class="stat-label">LATEST MONTH ('+latestLabel+')</div><div class="stat-sub">TC '+latestTC+' &middot; Hoist '+latestHoist+'</div></div>'+
    '<div class="stat"><div class="stat-val">'+nextTotal+'</div><div class="stat-label">NEXT MONTH ('+nextLabel+')</div><div class="stat-sub">TC '+nextTC+' &middot; Hoist '+nextHoist+'</div></div>';

  // --- Chart ---
  var labels=months.map(function(m){return m.name;});
  var tcData=months.map(function(m){
    var t=0;m.rows.forEach(function(r){if(r.name.startsWith('TC'))t+=r.vals[5];});return t;
  });
  var hoistData=months.map(function(m){
    var t=0;m.rows.forEach(function(r){if(r.name.startsWith('Hoist'))t+=r.vals[5];});return t;
  });
  var avgTotalPerMonth=totalAll/(months.length||1);
  var avgLineData=months.map(function(){return avgTotalPerMonth;});
  var stackMax=0;
  months.forEach(function(m,idx){stackMax=Math.max(stackMax,tcData[idx]+hoistData[idx]);});
  var yMax=Math.ceil(stackMax/5)*5+5;
  var ctx=document.getElementById('eventsChart').getContext('2d');
  new Chart(ctx,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[
        {label:'Tower Crane',data:tcData,backgroundColor:'rgba(52,152,219,0.8)',borderRadius:3},
        {label:'Hoist',data:hoistData,backgroundColor:'rgba(155,89,182,0.8)',borderRadius:3},
        {type:'line',label:'Average Total ('+avgTotalPerMonth.toFixed(1)+'/mo)',data:avgLineData,yAxisID:'y1',borderColor:'#e87722',borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8ea3bc',font:{family:'Barlow',size:12}}}},
      scales:{
        x:{stacked:true,ticks:{color:'#8ea3bc',font:{family:'Barlow',size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{stacked:true,min:0,max:yMax,ticks:{color:'#8ea3bc',font:{family:'Barlow',size:11}},grid:{color:'rgba(255,255,255,0.04)'},beginAtZero:true},
        y1:{display:false,min:0,max:yMax}
      }
    }
  });

  // --- Breakdown table ---
  var tbody=document.getElementById('breakdown-body');
  var html='';
  months.forEach(function(m){
    m.rows.forEach(function(r,idx){
      var badge=r.name.startsWith('TC')?'<span class="badge badge-tc">TC</span>':'<span class="badge badge-hoist">HOIST</span>';
      var shortName=r.name.replace('TC - ','').replace('Hoist - ','');
      html+='<tr>'+(idx===0?'<td rowspan="'+(m.rows.length+(m.total?1:0))+'">'+m.name+'</td>':'')+'<td>'+badge+' '+shortName+'</td><td>'+r.vals[0]+'</td><td>'+r.vals[1]+'</td><td>'+r.vals[2]+'</td><td>'+r.vals[3]+'</td><td>'+r.vals[4]+'</td><td>'+r.vals[5]+'</td></tr>';
    });
    if(m.total){
      html+='<tr class="total-row"><td><strong>Total</strong></td><td>'+m.total.vals[0]+'</td><td>'+m.total.vals[1]+'</td><td>'+m.total.vals[2]+'</td><td>'+m.total.vals[3]+'</td><td>'+m.total.vals[4]+'</td><td>'+m.total.vals[5]+'</td></tr>';
    }
  });
  tbody.innerHTML=html;

  document.getElementById('loading').style.display='none';
  document.getElementById('main-content').style.display='block';
}).catch(function(e){
  document.getElementById('loading').textContent='Error loading data: '+e.message;
});
</script>
</body>
</html>
