h<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1b2e">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<title>Events — SCG Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--navy:#0d1b2e;--navy-mid:#162236;--navy-light:#1e3047;--navy-card:#192840;h
--orange:#e87722;--orange-dark:#c5621a;--orange-glow:rgba(232,119,34,0.12);
--green:#2ecc71;--red:#e74c3c;--blue:#3498db;--purple:#9b59b6;
--text:#f0f4f8;--text-muted:#8ea3bc;--text-dim:#4d6580;
--border:rgba(255,255,255,0.07);--border-o:rgba(232,119,34,0.35);
}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--navy);color:var(--text);font-size:13px;line-height:1.5;}
body{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:9px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-link{display:flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:11px;letter-spacing:0.5px;transition:color 0.15s;}
.back-link:hover{color:var(--orange);}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);flex:1;text-align:center;}
.content{flex:1;padding:22px 26px;max-width:1100px;width:100%;margin:0 auto;}
.ph{margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:14px;}
.ptitle{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.psub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ffffff;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px;}
.ct{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.ct i{color:var(--orange);font-size:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.stat{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:14px;}
.sl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin-top:4px;color:var(--text);}
.ss{font-size:10px;color:var(--text-muted);margin-top:2px;}
#ev-loading{display:flex;align-items:center;justify-content:center;padding:80px 20px;color:var(--text-dim);font-size:11px;letter-spacing:1px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="topbar">
<a href="finance.html" class="back-link"><i class="ti ti-arrow-left"></i> Back to Finance</a>
<div class="tb-title">Events</div>
</div>
<div class="content">
<div class="ph">
<div class="ptitle">Events</div>
<div class="psub">Monthly crane &amp; hoist event counts by market</div>
</div>
<div id="ev-loading">Loading events…</div>
<div id="ev-content" style="display:none;">
<div class="g4" id="ev-stats"></div>
<div class="section-label">Monthly Events — Last 12 Months</div>
<div class="card">
<div class="ct"><i class="ti ti-chart-bar"></i> Tower Crane &amp; Hoist Events by Month</div>
<canvas id="events-chart" style="width:100%;max-height:340px;"></canvas>
</div>
<div class="card">
<div class="ct"><i class="ti ti-table"></i> Events by Market &amp; Type</div>
<div id="breakdown-table" style="overflow-x:auto;"></div>
</div>
</div>
</div>
<script>
var PUB = '2PACX-1vRt4rPD6G4Sffo_rq8EKKPmT6Ma9MS2u3jNS91P3AaUx0jtMPDugnmliM94EMvzIqZBgacwgmjPUswm';
function csvFetch(gid,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','https://docs.google.com/spreadsheets/d/e/'+PUB+'/pub?single=true&output=csv&gid='+gid);
  xhr.onload=function(){if(xhr.status===200)cb(null,xhr.responseText);else cb(new Error('HTTP '+xhr.status));};
  xhr.onerror=function(){cb(new Error('Network error'));};
  xhr.send();
}
function parseCSV(text){
  return text.trim().split('\n').map(function(line){
    var cols=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}
    cols.push(cur.trim());return cols;
  });
}
function toNum(v){return parseFloat(String(v).replace(/[^0-9.-]/g,''));}
function loadEvents(){
  csvFetch('1814824290',function(err,text){
    document.getElementById('ev-loading').style.display='none';
    document.getElementById('ev-content').style.display='block';
    if(err){console.error(err);return;}
    var rows=parseCSV(text);
    var months=[],tcAZ=[],tcCA=[],tcCO=[],tcOther=[],hAZ=[],hCA=[],hCO=[],hOther=[];
    var i=0;
    while(i<rows.length){
      var r=rows[i]||[];
      if(r[1]&&/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b/.test(r[1])&&(!r[2]||!r[2].trim())){
        months.push(r[1].trim());
        var gv=function(ri,col){var v=toNum(((rows[ri]||[])[col]||'0'));return isNaN(v)?0:v;};
        tcAZ.push(gv(i+2,6));tcCA.push(gv(i+3,6));tcCO.push(gv(i+4,6));tcOther.push(gv(i+5,6));
        hAZ.push(gv(i+6,6));hCA.push(gv(i+7,6));hCO.push(gv(i+8,6));hOther.push(gv(i+9,6));
        i+=13;
      }else{i++;}
    }
    var n=Math.min(12,months.length),sl=function(a){return a.slice(-n);};
    months=sl(months);tcAZ=sl(tcAZ);tcCA=sl(tcCA);tcCO=sl(tcCO);tcOther=sl(tcOther);
    hAZ=sl(hAZ);hCA=sl(hCA);hCO=sl(hCO);hOther=sl(hOther);
    var sum=function(a){return a.reduce(function(s,v){return s+v;},0);};
    if(months.length){
      var last=months.length-1;
      var ltc=tcAZ[last]+tcCA[last]+tcCO[last]+tcOther[last];
      var lh=hAZ[last]+hCA[last]+hCO[last]+hOther[last];
      document.getElementById('ev-stats').innerHTML=
        '<div class="stat"><div class="sl">TC Events ('+months[last]+')</div><div class="sv">'+ltc+'</div><div class="ss">Tower Crane</div></div>'+
        '<div class="stat"><div class="sl">Hoist Events ('+months[last]+')</div><div class="sv">'+lh+'</div><div class="ss">Hoist</div></div>'+
        '<div class="stat"><div class="sl">TC Events (12 Mo)</div><div class="sv">'+sum(tcAZ.concat(tcCA,tcCO,tcOther))+'</div><div class="ss">Tower Crane total</div></div>'+
        '<div class="stat"><div class="sl">Hoist Events (12 Mo)</div><div class="sv">'+sum(hAZ.concat(hCA,hCO,hOther))+'</div><div class="ss">Hoist total</div></div>';
      var canvas=document.getElementById('events-chart');
      if(canvas._chart)canvas._chart.destroy();
      canvas._chart=new Chart(canvas,{type:'bar',data:{labels:months,datasets:[
        {label:'TC-AZ',data:tcAZ,backgroundColor:'#e87722',stack:'tc',borderRadius:2},
        {label:'TC-CA',data:tcCA,backgroundColor:'#f0a050',stack:'tc',borderRadius:2},
        {label:'TC-CO',data:tcCO,backgroundColor:'#f5c580',stack:'tc',borderRadius:2},
        {label:'TC-Other',data:tcOther,backgroundColor:'#f8ddb0',stack:'tc',borderRadius:2},
        {label:'Hoist-AZ',data:hAZ,backgroundColor:'#3498db',stack:'hoist',borderRadius:2},
        {label:'Hoist-CA',data:hCA,backgroundColor:'#67b3e8',stack:'hoist',borderRadius:2},
        {label:'Hoist-CO',data:hCO,backgroundColor:'#96ccf0',stack:'hoist',borderRadius:2},
        {label:'Hoist-Other',data:hOther,backgroundColor:'#c2e3f8',stack:'hoist',borderRadius:2}
      ]},options:{responsive:true,plugins:{legend:{labels:{color:'#f0f4f8',font:{size:10},boxWidth:12}}},scales:{x:{stacked:true,ticks:{color:'#8ea3bc',font:{size:10},maxRotation:45},grid:{color:'rgba(255,255,255,0.05)'}},y:{stacked:true,ticks:{color:'#8ea3bc'},grid:{color:'rgba(255,255,255,0.07)'},beginAtZero:true}}}});
      var mkR=function(l,az,ca,co,ot,tot,h,t){var bg=h?'background:var(--navy-light);':t?'background:rgba(232,119,34,0.08);':'background:var(--navy);';var fw=h||t?'font-weight:600;':'';var fc=t?'color:var(--orange)':'color:var(--text)';return '<tr style="'+bg+fw+fc+'"><td style="padding:6px 8px;">'+l+'</td><td style="padding:6px 8px;text-align:right;">'+az+'</td><td style="padding:6px 8px;text-align:right;">'+ca+'</td><td style="padding:6px 8px;text-align:right;">'+co+'</td><td style="padding:6px 8px;text-align:right;">'+ot+'</td><td style="padding:6px 8px;text-align:right;">'+tot+'</td></tr>';};
      document.getElementById('breakdown-table').innerHTML='<table style="width:100%;border-collapse:collapse;font-size:11px;"><thead>'+mkR('Category','AZ','CA','CO','Other','Total',true,false)+'</thead><tbody>'+mkR('TC-AZ',sum(tcAZ),'-','-','-',sum(tcAZ),false,false)+mkR('TC-CA','-',sum(tcCA),'-','-',sum(tcCA),false,false)+mkR('TC-CO','-','-',sum(tcCO),'-',sum(tcCO),false,false)+mkR('TC-Other','-','-','-',sum(tcOther),sum(tcOther),false,false)+mkR('Tower Crane Total',sum(tcAZ),sum(tcCA),sum(tcCO),sum(tcOther),sum(tcAZ)+sum(tcCA)+sum(tcCO)+sum(tcOther),false,true)+mkR('Hoist-AZ',sum(hAZ),'-','-','-',sum(hAZ),false,false)+mkR('Hoist-CA','-',sum(hCA),'-','-',sum(hCA),false,false)+mkR('Hoist-CO','-','-',sum(hCO),'-',sum(hCO),false,false)+mkR('Hoist-Other','-','-','-',sum(hOther),sum(hOther),false,false)+mkR('Hoist Total',sum(hAZ),sum(hCA),sum(hCO),sum(hOther),sum(hAZ)+sum(hCA)+sum(hCO)+sum(hOther),false,true)+'</tbody></table>';
    }
  });
}
loadEvents();
</script>
</body>
</html>
