<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1b2e">
<title>Performance Reports — SCG Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#0d1b2e;--navy-mid:#162236;--navy-light:#1e3047;--navy-card:#192840;--orange:#e87722;--orange-dark:#c5621a;--orange-glow:rgba(232,119,34,0.12);--green:#2ecc71;--red:#e74c3c;--blue:#3498db;--purple:#9b59b6;--text:#f0f4f8;--text-muted:#8ea3bc;--text-dim:#4d6580;--border:rgba(255,255,255,0.07);--border-o:rgba(232,119,34,0.35);}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--navy);color:var(--text);font-size:13px;line-height:1.5;}
body{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:9px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-link{display:flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:11px;letter-spacing:0.5px;transition:color 0.15s;}
.back-link:hover{color:var(--orange);}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);flex:1;text-align:center;}
.content{flex:1;padding:22px 26px;max-width:1100px;width:100%;margin:0 auto;}
.ph{margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:14px;display:flex;align-items:flex-end;justify-content:space-between;}
.ptitle{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.psub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ffffff;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.section-date{font-size:11px;letter-spacing:1px;color:var(--text-muted);font-weight:400;text-transform:uppercase;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;}
.card{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;}
.card:last-child{margin-bottom:0;}
.ct{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ct i{color:var(--orange);font-size:14px;}
.mc{background:var(--navy-card);border:1px solid var(--border);border-radius:8px;padding:14px;}
.ml{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
.mv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin-top:4px;}
.ms{font-size:10px;color:var(--text-muted);margin-top:2px;}
.up{color:var(--green);}.dn{color:var(--red);}
.ql{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--navy-light);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.12s;color:var(--text);margin-bottom:7px;text-decoration:none;}
.ql:hover{border-color:var(--border-o);background:var(--orange-glow);}
.ql i{color:var(--orange);font-size:15px;flex-shrink:0;}
.ql-name{font-size:12px;font-weight:500;}
.ql-ext{margin-left:auto;color:var(--text-dim);font-size:11px;}
</style>
</head>
<body>
<div class="topbar">
<a href="index.html" class="back-link"><i class="ti ti-arrow-left"></i> Back to Portal</a>
<div class="tb-title">Performance Reports</div>
</div>
<div class="content">
<div class="ph">
<div><div class="ptitle">Performance Reports</div></div>
</div>
<div class="card"><div class="ct"><i class="ti ti-file-analytics"></i> Reports</div>
<a href="pl.html" class="ql"><i class="ti ti-file-spreadsheet"></i><span class="ql-name">Monthly P&amp;L</span><span class="ql-ext"><i class="ti ti-arrow-right"></i></span></a>
<a href="wip.html" class="ql"><i class="ti ti-file-spreadsheet"></i><span class="ql-name">WIP Report</span><span class="ql-ext"><i class="ti ti-arrow-right"></i></span></a>
<a href="pipeline.html" class="ql"><i class="ti ti-file-spreadsheet"></i><span class="ql-name">Sales Pipeline</span><span class="ql-ext"><i class="ti ti-arrow-right"></i></span></a>
<a href="utilization.html" class="ql"><i class="ti ti-chart-bar"></i><span class="ql-name">Utilization</span><span class="ql-ext"><i class="ti ti-arrow-right"></i></span></a>
<a href="events.html" class="ql"><i class="ti ti-calendar-event"></i><span class="ql-name">Events</span><span class="ql-ext"><i class="ti ti-arrow-right"></i></span></a>
<a href="ar.html" class="ql"><i class="ti ti-file-spreadsheet"></i><span class="ql-name">AR / AP Aging</span><span class="ql-ext"><i class="ti ti-arrow-right"></i></span></a>
<a href="safety.html" class="ql"><i class="ti ti-shield-check"></i><span class="ql-name">Safety</span><span class="ql-ext"><i class="ti ti-arrow-right"></i></span></a>
</div>
</div>
<script>
var PUB='2PACX-1vRheWj8_iCcO26VDyuHtvr0Oap-ilvPVr9nlskArSj9uPCzVmofn-i1Lw0lRezDC8eHemBwdcuGKF_3';
function csvFetch(gid,cb){var xhr=new XMLHttpRequest();xhr.open('GET','https://docs.google.com/spreadsheets/d/e/'+PUB+'/pub?single=true&output=csv&gid='+gid);xhr.onload=function(){if(xhr.status===200)cb(null,xhr.responseText);else cb(new Error('HTTP '+xhr.status));};xhr.onerror=function(){cb(new Error('Network error'));};xhr.send();}
function parseCSV(text){return text.trim().split('\n').map(function(line){var cols=[],cur='',inQ=false;for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=c;}}cols.push(cur.trim());return cols;});}
function toNum(v){return parseFloat(String(v).replace(/[^0-9.-]/g,''));}
function fmtM(v){var n=toNum(v);if(isNaN(n))return '—';var abs=Math.abs(n),sign=n<0?'-':'';if(abs>=1000000)return sign+'$'+(abs/1000000).toFixed(1)+'M';if(abs>=1000)return sign+'$'+(abs/1000).toFixed(0)+'K';return sign+'$'+abs.toFixed(0);}
function setText(id,val){var el=document.getElementById(id);if(el)el.textContent=val;}
function setClass(id,cls){var el=document.getElementById(id);if(el)el.className='ms'+(cls?' '+cls:'');}
function loadFinancial(){csvFetch('234022854',function(err,text){if(err)return;var rows=parseCSV(text),header=rows[1]||[],lastCol=header.length-1,revRow=null,ebitdaRow=null;for(var i=2;i<rows.length;i++){var l=(rows[i][0]||'').toLowerCase();if(!revRow&&l==='revenue')revRow=rows[i];if(!ebitdaRow&&(l==='ebitda'||l==='adjusted ebitda'))ebitdaRow=rows[i];}setText('kpi-date',header[lastCol-1]||'');if(revRow){setText('kpi-rev',fmtM(revRow[lastCol]));setText('kpi-rev-sub','Trailing 12 months');}if(ebitdaRow){var e=toNum(ebitdaRow[lastCol]);setText('kpi-ebitda',fmtM(e));setText('kpi-ebitda-sub',e>=0?'Positive TTM':'Negative TTM');setClass('kpi-ebitda-sub',e>=0?'up':'dn');}});}
function loadBacklog(){csvFetch('1625713028',function(err,text){if(err)return;var rows=parseCSV(text),lastData=null;for(var i=rows.length-1;i>=0;i--){if((rows[i][0]||'').match(/\d{1,2}\/\d{1,2}\/\d{2,4}/)){lastData=rows[i];break;}}if(!lastData)return;var d=new Date(lastData[0]),mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];setText('kpi-backlog',fmtM(lastData[3]));setText('kpi-backlog-sub','As of '+(isNaN(d.getTime())?lastData[0]:mo[d.getMonth()]+' '+String(d.getFullYear()).slice(2)));});}
</script>
</body>
</html>
